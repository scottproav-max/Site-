<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>New Message</title>
  <link rel="stylesheet" href="compose.css" />
</head>
<body>
  <div id="titlebar">
    <span id="window-title">New Message</span>
    <div id="titlebar-actions">
      <button id="btn-discard" title="Discard">Discard</button>
      <button id="btn-send" title="Send (⌘↵)">Send</button>
    </div>
  </div>

  <div id="fields">
    <div class="field-row">
      <label>From</label>
      <select id="from-account"></select>
    </div>
    <div class="field-row">
      <label>To</label>
      <input id="to" type="text" placeholder="recipient@example.com" autocomplete="off" />
    </div>
    <div class="field-row" id="cc-row">
      <label>Cc</label>
      <input id="cc" type="text" placeholder="cc@example.com" autocomplete="off" />
    </div>
    <div class="field-row" id="bcc-row" style="display:none">
      <label>Bcc</label>
      <input id="bcc" type="text" placeholder="bcc@example.com" autocomplete="off" />
    </div>
    <div class="field-row">
      <label>Subject</label>
      <input id="subject" type="text" placeholder="Subject" autocomplete="off" />
    </div>
    <div id="field-extras">
      <button id="btn-toggle-bcc" class="chip">+ Bcc</button>
    </div>
  </div>

  <div id="toolbar">
    <button data-cmd="bold" title="Bold"><b>B</b></button>
    <button data-cmd="italic" title="Italic"><i>I</i></button>
    <button data-cmd="underline" title="Underline"><u>U</u></button>
    <div class="sep"></div>
    <button data-cmd="insertUnorderedList" title="Bullet list">&#8226;&#9135;</button>
    <button data-cmd="insertOrderedList" title="Numbered list">1.</button>
    <div class="sep"></div>
    <button data-cmd="justifyLeft" title="Left">&#8676;</button>
    <button data-cmd="justifyCenter" title="Center">&#8803;</button>
    <button data-cmd="justifyRight" title="Right">&#8677;</button>
    <div class="sep"></div>
    <button id="btn-clear-format" title="Clear formatting">T&#x0338;</button>
  </div>

  <div id="body-area">
    <div id="editor" contenteditable="true" spellcheck="true"></div>
  </div>

  <div id="status-bar">
    <span id="status-msg"></span>
    <span id="char-count">0 chars</span>
  </div>

  <script src="compose.js"></script>
</body>
</html>
